project:
  name: "mri-brain-segmentation"
  version: "1.0.0"

data:
  root: "./data"
  num_classes: 4
  roi_size: [64, 64, 64]
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  seed: 42

training:
  batch_size: 2
  epochs: 50
  learning_rate: 1e-4
  weight_decay: 1e-5
  early_stop_patience: 10

model:
  architecture: "UNet"
  channels: [16, 32, 64, 128, 256]
  strides: [2, 2, 2, 2]
  norm: "instance"

output:
  save_dir: "./results"

